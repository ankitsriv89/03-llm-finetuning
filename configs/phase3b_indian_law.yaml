# ============================================================
# Phase 3b Config: Mistral-7B + Indian Law (IPC / BNS / Constitution)
# ============================================================
# Fine-tunes Mistral-7B-Instruct on Indian legal Q&A for JusticeAI alignment.
#
# 3-WAY DATASET MIX (weights enforced in train_runpod_indian_law.py):
#
#   Primary (~60%):  viber1/indian-law-dataset
#                    Indian law Q&A: IPC/BNS, CPC/BNSS, Constitution, BSA
#                    Format: {question, answer}
#                    License: Apache 2.0
#                    Vintage: pre-July-2024 — cites repealed IPC sections
#
#   Auxiliary (25%): Exploration-Lab/InLegalNLI
#                    NLI pairs from Indian SC/HC judgments
#                    Reformatted as: "Does this judgment support the claim? Explain."
#                    Provides Indian court reasoning signal
#                    Vintage: pre-July-2024 (precedent still valid under BNS)
#
#   BNS map (15%):   data/bns_bnss_bsa_mapping.jsonl  (LOCALLY GENERATED)
#                    Run: python scripts/build_bns_mapping_dataset.py
#                    ~800 samples from 109 hand-curated seed mappings
#                    Teaches: IPC §302 → BNS §103, CrPC §437 → BNSS §480, etc.
#                    Vintage: AUTHORITATIVE post-July-2024 statute references
#                    CRITICAL: without this, model cites repealed sections.
#
# Why this matters for JusticeAI (Project 9):
#   - JusticeAI targets bail decisions under BNS/BNSS/BSA (post-July 2024 codes)
#   - Adapter teaches Mistral Indian legal terminology AND post-2024 statute numbers
#   - Adapter stacks on top of InLegalBERT retrieval — same domain, same citations
#   - The BNS mapping component is what prevents "phantom IPC section" failures
#     flagged by SC in early-2026 review of AI legal tools
#
# Goal: LLM-judge score ≥ 3.5/5.0 on Indian law Q&A (baseline Mistral ~2.5)
#
# Eval: LLM-as-judge via Groq (Indian law rubric — see evaluate.py)
# RunPod script: scripts/train_runpod_indian_law.py
# Prerequisite:   python scripts/build_bns_mapping_dataset.py  (run once)


# --- Model ---
model:
  name: "mistralai/Mistral-7B-Instruct-v0.2"
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true


# --- LoRA Adapter ---
lora:
  r: 32
  # ^ Higher rank than Phase 3a (r=16). Indian law is a specialized distribution
  #   far from Mistral's training data — a larger adapter captures more domain shift.
  lora_alpha: 64
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"


# --- Dataset ---
dataset:
  name: "viber1/indian-law-dataset"
  split: "train"
  max_samples: null           # use all available

  test_size: 0.1
  instruction_field: "question"   # viber1 uses 'question' not 'instruction'
  context_field: null             # no separate clause context — question is self-contained
  response_field: "answer"        # viber1 uses 'answer' not 'output'

  # InLegalNLI auxiliary (script-level)
  auxiliary_dataset: "Exploration-Lab/InLegalNLI"
  auxiliary_samples: 3000     # 3K NLI pairs reformatted as legal reasoning Q&A
  auxiliary_weight: 0.25      # 25% of batch — heavier than Phase 3a pile-of-law mix
  # ^ 25% because InLegalNLI directly teaches Indian SC judgment reasoning,
  #   not just prose style. Worth more signal per sample than corpus text.

  # BNS/BNSS/BSA mapping (script-level — local JSONL file)
  bns_mapping_path: "data/bns_bnss_bsa_mapping.jsonl"
  bns_mapping_weight: 0.15    # 15% of batch — small dataset but high-signal
  # ^ Generated by scripts/build_bns_mapping_dataset.py (109 seed mappings → ~800 samples)
  #   Teaches post-July-2024 statute references that pre-2024 datasets lack.
  #   The script oversamples this (never drops any BNS samples) — every section
  #   mapping must be seen by the model multiple times across 4 epochs.


# --- Training ---
training:
  output_dir: "./outputs/phase3b-indian-law"

  num_train_epochs: 4
  # ^ 4 epochs — Indian law dataset is smaller than medical/contracts and the
  #   domain gap from Mistral's training is larger. Extra epochs compensate.
  #   Monitor val loss after epoch 3 to catch overfitting.

  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  # effective batch = 16

  learning_rate: 1.0e-4
  # ^ Conservative LR for domain-specific fine-tuning with r=32 adapter.
  #   Larger adapter + smaller LR = stable training without catastrophic forgetting.
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  # ^ Slightly longer warmup — larger LoRA rank benefits from slower ramp-up.

  max_seq_length: 2048
  # ^ Indian SC judgments and constitutional provisions are verbose.

  fp16: false                 # bf16=True set in script
  logging_steps: 10
  save_steps: 100
  # ^ Smaller dataset → more frequent saves relative to Phase 3a
  save_total_limit: 3
  # ^ Keep 3 checkpoints — useful for comparing epoch 3 vs 4 on Indian law eval
  report_to: "none"


# --- Evaluation ---
evaluation:
  enabled: true
  mode: "llm"
  metric: "llm_judge_score"
  max_eval_samples: 100
  # ^ LLM judge with Indian law rubric (BNS/BNSS/BSA section accuracy, procedure)
  target_improvement_pts: 1.0
  # ^ Higher target than Phase 3a — Mistral baseline on Indian law is weaker (~2.5)
  #   so there's more room. Target ≥3.5 = +1.0 pp from baseline.
  judge_system: "indian_law"
  # ^ Signals evaluate.py to use the Indian law rubric (checks BNS vs IPC accuracy,
  #   procedural correctness under BNSS, constitutional citation accuracy)


# --- HuggingFace Hub ---
hub:
  adapter_name: "indian-law"
  repo_suffix: "mistral-7b-indian-law-qlora"
  # ^ Full repo ID: {your_hf_username}/mistral-7b-indian-law-qlora
  # Note: Tag this as JusticeAI Phase 1 adapter in the model card
