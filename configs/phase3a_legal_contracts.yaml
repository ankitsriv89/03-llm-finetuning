# ============================================================
# Phase 3a Config: Mistral-7B + Legal Contracts (Universal)
# ============================================================
# Fine-tunes Mistral-7B-Instruct on contract clause Q&A.
#
#   Primary:   nguyen-brat/legal_contracts
#              ~10K contract clause Q&A pairs (from CUAD benchmark)
#              Format: {instruction, context (clause text), output}
#              Tasks: clause explanation, risk identification, term extraction
#              License: Apache 2.0
#
#   Auxiliary: pile-of-law/pile-of-law  subset="freelaw"
#              Court opinions from Free Law Project / CourtListener
#              ~5K samples interleaved for legal prose pretraining signal
#              Mixing handled in train_runpod_legal_contracts.py
#
# Goal: LLM-judge score ≥ 3.5/5.0 (baseline Mistral ~3.0)
#
# Eval: LLM-as-judge via Groq llama-3.3-70b-versatile (legal rubric)
# RunPod script: scripts/train_runpod_legal_contracts.py


# --- Model ---
model:
  name: "mistralai/Mistral-7B-Instruct-v0.2"
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true


# --- LoRA Adapter ---
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"


# --- Dataset ---
dataset:
  name: "nguyen-brat/legal_contracts"
  split: "train"
  max_samples: null           # use all ~10K

  test_size: 0.1              # ~1K held-out for eval
  instruction_field: "instruction"
  context_field: "context"    # raw clause text
  response_field: "output"

  # Pile-of-Law auxiliary (script-level mixing)
  pile_of_law_subset: "freelaw"
  pile_of_law_samples: 5000   # 5K court opinions interleaved
  pile_of_law_weight: 0.2     # 20% of each batch from pile-of-law


# --- Training ---
training:
  output_dir: "./outputs/phase3a-legal-contracts"

  num_train_epochs: 3
  # ^ Legal clause language is formulaic; 3 passes needed to internalize
  #   terms like "indemnification", "force majeure", "limitation of liability".

  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  # effective batch = 16 (same as prior phases, halved per-device because seq_len doubled)

  learning_rate: 1.5e-4
  # ^ Slightly lower than medical phase — legal text is precise, smaller LR
  #   prevents over-confidence on contract-specific phrasing.
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03

  max_seq_length: 2048
  # ^ Contract clauses are long. 2048 covers >95% of legal_contracts without truncation.

  fp16: false                 # bf16=True set in script
  logging_steps: 10
  save_steps: 150
  save_total_limit: 2
  report_to: "none"


# --- Evaluation ---
evaluation:
  enabled: true
  mode: "llm"
  metric: "llm_judge_score"
  max_eval_samples: 100       # Groq free tier handles 100 reqs in ~2 min
  target_improvement_pts: 0.5 # target ≥3.5 vs baseline ~3.0


# --- HuggingFace Hub ---
hub:
  adapter_name: "legal-contracts"
  repo_suffix: "mistral-7b-legal-contracts-qlora"
